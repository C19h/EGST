<script type="text/javascript">
	function test0(){
		param = JSON.parse($('#info').val().replace(/[\r\n]/g,""))
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/dmc/init",
			data:JSON.stringify(param),
			success:function(result){
				$.notify({
						message: JSON.stringify(result)
					},{
					type: 'success',
					placement: {
						from: "bottom",
						align: "right"
					}
				});
			}
    	});
	}
