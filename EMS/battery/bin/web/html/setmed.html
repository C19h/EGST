
<!DOCTYPE html>
<head lang="zh-CN">
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta content="" name="description" />
	<meta content="" name="author" />
	<link rel="icon" href="/resource/favicon.ico">
	<title>RealData</title>
	<link href="/resource/bootstrap-notify/animate.css" rel="stylesheet">
	<link href="/resource/bootstrap-3.3.7-dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="/resource/bootstrap-3.3.7-dist/css/bootstrap-theme.min.css" rel="stylesheet">
	<link href="/resource/bootstrap-select/css/bootstrap-select.min.css" rel="stylesheet">
	
	<script src="/resource/jquery/jquery-1.11.3.min.js"></script>
	<script src="/resource/bootstrap-3.3.7-dist/js/bootstrap.min.js"></script>
	<script src="/resource/bootstrap-notify/bootstrap-notify.min.js"></script>
	<script src="/resource/bootstrap-select/js/bootstrap-select.min.js"></script>
</head>
<body>
	<table style="width: 100%;height: 100%;">
		<tr >
			<td style="width: 5%;"></td>
			<td>
				服务端IP设置 
			</td>
			<td>
				<input id="cmsip" value="127.0.0.1" type="text" placeholder="CMS IP" class="form-control">
			</td>
			<td style="width: 2%;"></td>
			<td style="width: 15%;">
				<input id="cmsport" value="80" type="text" placeholder="CMS Port" class="form-control">
			</td>
			<td style="width: 1%;"></td>
			<td style="width: 15%;">
			</td>
			<td style="width: 1%;"></td>
			<td style="width: 15%;">
			</td>
			<td style="width: 1%;"></td>
			<td>
				<button type="submit" class="btn btn-success" onclick="updatedata()">确认修改</button>
			</td>
			<td style="width: 5%;"></td>
		</tr>
	</table>
</body>
</html>
<script type="text/javascript">
	function updatedata(){
		var cmsip = document.getElementById("cmsip").value;
		var cmsport = document.getElementById("cmsport").value;
		pointdata = "";
		for (var i = 0; i < 5;i++){
			pointdata += $('#factory' + i).val() + ',';
			pointdata += $('#group' + i).val() + ',';
			if (i == 4){
				pointdata += $('#point' + i).val();
			}
			else{
				pointdata += $('#point' + i).val() + '#';
			}
		}
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/setPointConfig",
			data:JSON.stringify({
				"cmsip":cmsip,
				"cmsport":cmsport,
				"pointdata":pointdata
			}),
			success:function(result){
				if (result == 1){
					$.notify({
						message: '更新配置成功' 
					},{
						type: 'success',
						placement: {
							from: "bottom",
							align: "right"
						}
					});
				}
				else{
					$.notify({
						message: '更新配置失败' 
					},{
						type: 'warning',
						placement: {
							from: "bottom",
							align: "right"
						}
					});
				}
				refreshList()
			}
    	});
	}

	function refreshList(){
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/getPointConfig",
			data:JSON.stringify({
			}),
			success:function(result){
				var str = ""
				$('#cmsip').val(result['cmsip'])
				$('#cmsport').val(result['cmsport'])
			}
    	});
	}
	function refreshFactory(index, val){
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/getFactorys",
			data:JSON.stringify({
			}),
			success:function(result){
				var strv = "";
				for (var i = 0; i < result.length; i++){
					strv += '<option value="' + result[i]['ID'] + '">' + result[i]['Name'] + "(" + result[i]['Parent'] + ')</option>';
				}
				
				$('#factory' + index).on('changed.bs.select', function (e, clickedIndex, isSelected, previousValue) {
					refreshGroup(index, $('#factory' + index).val());
				});
				document.getElementById('factory' + index).innerHTML = strv;
				$('#factory' + index).val(val);
				$(".selectpicker").selectpicker('refresh');
			}
    	});
	}
	function refreshGroup(index, facid, val){
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/getGroups",
			data:JSON.stringify({
				'factoryid':facid
			}),
			success:function(result){
				var strv = "";
				for (var i = 0; i < result.length; i++){
					strv += '<option value="' + result[i]['ID'] + '">' + result[i]['Name'] + '</option>';
				}
				
				$('#group' + index).on('changed.bs.select', function (e, clickedIndex, isSelected, previousValue) {
					refreshPoint(index, $('#factory' + index).val(), $('#group' + index).val(), 0)
				});
				document.getElementById("group" + index).innerHTML = strv;
				$('#group' + index).val(val);
				$(".selectpicker").selectpicker('refresh');
			}
    	});
	}

	function refreshPoint(index, facid, groupid,type, val){
		$.ajax({
			type:"post",
			dataType:'json',
            contentType: "application/json; charset=utf-8",
			url:"/api/getPoints",
			data:JSON.stringify({
				'factoryid':facid,
				'groupid':groupid,
				'type':type
			}),
			success:function(result){
				var strv = "";
				for (var i = 0; i < result.length; i++){
					var valstr = result[i]['ID'];
					strv += '<option value="' + valstr+ '">' + result[i]['Name'] + '</option>';
				}
				
				$('#point' + index).on('changed.bs.select', function (e, clickedIndex, isSelected, previousValue) {
					
				});
				document.getElementById("point" + index).innerHTML = strv;
				$('#point' + index).val(val);
				$(".selectpicker").selectpicker('refresh');
			}
    	});
	}
	refreshList();
</script>
