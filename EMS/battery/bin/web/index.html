<script type="text/javascript">
	function mclick(mnode){
		var bar = document.getElementById("menu");
		for(var i = 0; i < bar.children.length; i++){
			bar.children[i].removeAttribute("class");
		}
		var tm = document.getElementById(mnode);
		tm.setAttribute("class","active");
		load_home(mnode);
	}
	function load_home(mnode) {
		url = "";
		if (mnode == 'm0'){
			url = "/html/main.html";
		}
		if (mnode == 'm1'){
			url = "/html/main2.html";
		}
		if (mnode == 'm4'){
			url = "/html/main2in.html";
		}
		if (mnode == 'm2'){
			url = '/html/main3.html';
		}
		if (mnode == 'm21'){
			url = '/html/setmed.html';
		}
		if (mnode == 'm3'){
			url = "/html/logdata.html";
		}
		if (mnode == 'm5'){
			url = "/docs/api";
		}
		document.getElementById("main").innerHTML = '<object type="text/html" data="' + url + '" width="100%" height="100%"></object>';
	}
	load_home('m5')
	//clearInterval(timer);
	//timer = setInterval(refreshpic,1000);
</script>
